<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="이해랑 Haerang Lee - Front-End Developer">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A9C7F5"/>
      <stop offset="50%" stop-color="#BFBDF0"/>
      <stop offset="100%" stop-color="#D2BEEC"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.10"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="300" fill="url(#sky)"/>

  <!-- 은은한 장식 원 -->
  <circle cx="1040" cy="70" r="90" fill="#ffffff" opacity="0.13"/>
  <circle cx="1120" cy="200" r="50" fill="#ffffff" opacity="0.10"/>
  <circle cx="130" cy="235" r="70" fill="#ffffff" opacity="0.11"/>
  <circle cx="60" cy="80" r="34" fill="#ffffff" opacity="0.12"/>

  <!-- 부드러운 물결 -->
  <path d="M0,250 C300,210 500,290 700,255 C900,220 1050,275 1200,245 L1200,300 L0,300 Z" fill="url(#wave)"/>

  <!-- 이름 (한글 + 영문 자연스럽게 한 묶음) -->
  <text x="600" y="138" text-anchor="middle"
        font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="66" font-weight="700" fill="#3E3A66" letter-spacing="2">이해랑</text>
  <text x="600" y="182" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="26" font-weight="500" fill="#5B5790" letter-spacing="8">HAERANG LEE</text>

  <!-- 구분선 -->
  <rect x="540" y="200" width="120" height="2" rx="1" fill="#5B5790" opacity="0.45"/>

  <!-- 한 줄 소개 -->
  <text x="600" y="232" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="17" font-weight="400" fill="#6A6699" letter-spacing="1">Front-End Developer · AI Service Planning</text>
</svg>
