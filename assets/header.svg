<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" role="img" aria-label="이해랑 Haerang Lee - Front-End Developer">
  <defs>
    <linearGradient id="by" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A6C9F2"/>
      <stop offset="45%" stop-color="#C8DAD8"/>
      <stop offset="100%" stop-color="#F6E8A6"/>
    </linearGradient>
  </defs>

  <!-- 아래가 곡선인 배너 (사각형 느낌 제거) -->
  <path d="M0,0 L1200,0 L1200,145 C980,182 820,132 600,158 C400,180 200,135 0,170 Z" fill="url(#by)"/>

  <!-- 은은한 장식 원 -->
  <circle cx="1075" cy="48" r="52" fill="#ffffff" opacity="0.16"/>
  <circle cx="135" cy="52" r="30" fill="#ffffff" opacity="0.13"/>

  <!-- 이름 (한글 + 영문 한 묶음) -->
  <text x="600" y="70" text-anchor="middle"
        font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif"
        font-size="48" font-weight="700" fill="#21386B" letter-spacing="2">이해랑</text>
  <text x="600" y="102" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="20" font-weight="500" fill="#2E4577" letter-spacing="8">HAERANG LEE</text>

  <!-- 구분선 -->
  <rect x="556" y="116" width="88" height="2" rx="1" fill="#2E4577" opacity="0.45"/>

  <!-- 한 줄 소개 -->
  <text x="600" y="140" text-anchor="middle"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="15" font-weight="400" fill="#33497E" letter-spacing="1">Front-End Developer · AI Service Planning</text>
